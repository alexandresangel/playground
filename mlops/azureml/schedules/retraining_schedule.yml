$schema: https://azuremlschemas.azureedge.net/latest/schedule.schema.json
name: diapason_retraining_schedule
display_name: Diapason retraining and backtesting schedule
description: Template schedule for periodic retraining/backtesting. Fill input paths before creation.
trigger:
