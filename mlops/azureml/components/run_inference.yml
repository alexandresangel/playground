$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
name: diapason_run_inference
display_name: Run Daily Inference Placeholder
version: 1
type: command
description: Placeholder component; daily inference CLI is not implemented yet.
inputs:
  gold_path:
    type: uri_folder
