$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
name: diapason_run_backtest
display_name: Run Backtest
version: 1
type: command
description: Run a YAML-configured rolling-origin backtest.
inputs:
  config_path:
    type: uri_file
  gold_path:
    type: uri_folder
  ruleset_path:
    type: uri_file
outputs:
  backtest_path:
    type: uri_folder
code: ../../../
environment: azureml:diapason-forecasting-env@latest
command: >-
  python -m pip install -e .
  && run-backtest
  --config-path ${{inputs.config_path}}
  --input-path ${{inputs.gold_path}}
  --output-path ${{outputs.backtest_path}}
  --ruleset-path ${{inputs.ruleset_path}}
