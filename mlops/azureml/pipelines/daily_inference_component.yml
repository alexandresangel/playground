$schema: https://azuremlschemas.azureedge.net/latest/pipelineComponent.schema.json
type: pipeline
name: diapason_daily_inference_pipeline
display_name: Diapason Daily Inference Pipeline
version: 1
description: Pipeline component that refreshes data layers and scores daily D+1 forecasts.
inputs:
  bronze_path:
    type: uri_folder
  ruleset_path:
    type: uri_file
  dataset_kind:
    type: string
    default: tabular
  cutoff_date:
    type: string
  train_window_days:
    type: integer
    default: 28
  history_window_days:
    type: integer
    default: 90
outputs:
  forecast_path:
    type: uri_folder
jobs:
  build_silver:
    type: command
    component: ../components/build_silver.yml
    inputs:
      bronze_path: ${{parent.inputs.bronze_path}}
  build_gold:
    type: command
    component: ../components/build_gold.yml
    inputs:
      silver_path: ${{parent.jobs.build_silver.outputs.silver_path}}
      ruleset_path: ${{parent.inputs.ruleset_path}}
  run_inference:
    type: command
    component: ../components/run_inference.yml
    inputs:
      gold_path: ${{parent.jobs.build_gold.outputs.gold_path}}
      ruleset_path: ${{parent.inputs.ruleset_path}}
      dataset_kind: ${{parent.inputs.dataset_kind}}
      cutoff_date: ${{parent.inputs.cutoff_date}}
      train_window_days: ${{parent.inputs.train_window_days}}
      history_window_days: ${{parent.inputs.history_window_days}}
    outputs:
      forecast_path: ${{parent.outputs.forecast_path}}
