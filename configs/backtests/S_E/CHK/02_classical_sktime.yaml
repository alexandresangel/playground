input_path: data/gold
output_path: data/backtests
ruleset_path: configs/rulesets/loreal_cash_in_v1.yaml

dataset:
  history_window_days: 90
  target_transform: log1p
  features:
    calendar: false
    known_d1: false
    target_lags: []
    rolling_windows: []
    cross_movement_known:
      enabled: false
log_level: INFO

evaluation:
  cutoff_start: "2023-01-01"
  cutoff_end: "2026-02-28"
  train_window_days: 365
  log_every_n_cutoffs: 7

models:
  - name: auto_arima
    custom_name: default
  - name: sarima
    custom_name: default
  - name: theta
    custom_name: default
  - name: tbats
    custom_name: default

sequence:
  entity: "OAE850"
  currency: "EUR"
  movement_type: "CHK+"
  filters: {}
