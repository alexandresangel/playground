input_path: data/gold
output_path: data/backtests
ruleset_path: configs/rulesets/loreal_cash_in_v1.yaml

dataset:
  history_window_days: 90
  features:
    calendar: false
    known_d1: false
    target_lags: []
    rolling_windows: []
    cross_movement_known:
      enabled: false
log_level: INFO

evaluation:
  cutoff_start: "2026-02-01"
  cutoff_end: "2026-02-14"
  train_window_days: 365
  log_every_n_cutoffs: 1

models:
  - name: chronos
    custom_name: bolt_tiny
    parameters:
      model_path: amazon/chronos-bolt-tiny
      seed: 1
      use_source_package: false
      ignore_deps: false
  - name: moirai
    custom_name: small_cpu
    parameters:
      checkpoint_path: sktime/moirai-1.0-R-small
      context_length: 90
      patch_size: 32
      num_samples: 20
      target_dim: 1
      map_location: cpu
      deterministic: true
      batch_size: 32
      use_source_package: false
  - name: tiny_time_mixer
    custom_name: zero_shot
    parameters:
      model_path: ibm/TTM
      revision: main
      fit_strategy: zero-shot
      validation_split: 0.2
      broadcasting: false
      use_source_package: false
  - name: hf_transformers
    custom_name: informer_minimal
    parameters:
      model_path: huggingface/informer-tourism-monthly
      fit_strategy: minimal
      validation_split: 0.2
      deterministic: true
      config:
        context_length: 28
        prediction_length: 1
        lags_sequence: [1, 2, 7, 14]
        use_cpu: true
      training_args:
        num_train_epochs: 1
        output_dir: .cache/cash_flow_forecast/hf_transformers
        per_device_train_batch_size: 32
        per_device_eval_batch_size: 32
        use_cpu: true
        disable_tqdm: true
        report_to: []
        save_strategy: "no"
        logging_strategy: "no"

sequence:
  entity: "OAE850"
  currency: "EUR"
  movement_type: "CHK+"
  filters: {}
